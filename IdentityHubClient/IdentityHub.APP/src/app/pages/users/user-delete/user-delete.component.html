<section class="max-w-lg space-y-6">
  <a
    [routerLink]="userId ? ['/app/users', userId] : ['/app/users']"
    class="inline-flex items-center gap-2 text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors duration-150"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/>
    </svg>
    Cancel and go back
  </a>

  @if (isLoading) {
    <div class="bg-white rounded-xl border shadow-sm p-6 space-y-4">
      <div class="h-7 w-40 rounded-md bg-slate-100 animate-pulse"></div>
      <div class="h-20 rounded-lg bg-slate-100 animate-pulse"></div>
    </div>
  } @else if (loadError || !user) {
    <div class="bg-white rounded-xl border shadow-sm p-8 text-center space-y-4">
      <p class="text-slate-900 font-medium">User not found</p>
      <a routerLink="/app/users" class="inline-flex rounded-lg bg-slate-900 text-white px-4 py-2 text-sm font-medium hover:bg-slate-800 transition-colors duration-150">
        Users list
      </a>
    </div>
  } @else {
    <header>
      <h1 class="text-2xl font-semibold text-slate-900">Delete user</h1>
      <p class="text-slate-500 mt-1">This action is permanent and cannot be undone.</p>
    </header>

    <div class="rounded-xl border border-red-200 bg-red-50/80 p-5 space-y-4">
      <div class="flex gap-3">
        <div class="shrink-0 text-red-600">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m0 3.75h.008v.008H12v-.008ZM10.34 3.43 1.82 18a1.875 1.875 0 0 0 1.62 2.813h17.12A1.875 1.875 0 0 0 22.18 18L13.66 3.43a1.875 1.875 0 0 0-3.32 0Z"/>
          </svg>
        </div>
        <div class="min-w-0">
          <p class="font-medium text-red-900">You are about to delete:</p>
          <p class="mt-2 text-sm text-red-950 break-all font-medium">{{ user.email || user.id }}</p>
          @if (user.fullName) {
            <p class="mt-1 text-sm text-red-800">{{ user.fullName }}</p>
          }
        </div>
      </div>

      <label class="flex items-start gap-3 cursor-pointer">
        <input
          type="checkbox"
          [(ngModel)]="confirmChecked"
          class="mt-1 h-4 w-4 rounded border-red-300 text-red-600 focus:ring-red-500"
        />
        <span class="text-sm text-red-950">I understand this user will be removed from the system.</span>
      </label>
    </div>

    <div class="flex flex-wrap gap-3">
      <button
        type="button"
        (click)="deleteUser()"
        [disabled]="!confirmChecked || isDeleting"
        class="inline-flex items-center justify-center rounded-lg bg-red-600 text-white px-4 py-2 text-sm font-medium hover:bg-red-500 disabled:opacity-50 disabled:pointer-events-none transition-colors duration-150"
      >
        @if (isDeleting) {
          Deleting…
        } @else {
          Delete permanently
        }
      </button>
      <button
        type="button"
        (click)="cancel()"
        [disabled]="isDeleting"
        class="inline-flex items-center justify-center rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 disabled:opacity-50 transition-colors duration-150"
      >
        Keep user
      </button>
    </div>
  }
</section>
