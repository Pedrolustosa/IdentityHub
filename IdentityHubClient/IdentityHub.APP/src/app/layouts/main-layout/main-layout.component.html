<div class="flex min-h-screen bg-slate-50 dark:bg-slate-900">
  <!-- Desktop sidebar -->
  <div class="hidden lg:block">
    <app-sidebar [collapsed]="isSidebarCollapsed"></app-sidebar>
  </div>

  <!-- Mobile drawer -->
  @if (isMobileSidebarOpen) {
    <div
      class="fixed inset-0 z-40 bg-slate-900/50 lg:hidden"
      (click)="closeMobileSidebar()"
      aria-hidden="true"
    ></div>
    <div class="fixed inset-y-0 left-0 z-50 lg:hidden" (click)="closeMobileSidebar()">
      <app-sidebar [collapsed]="false"></app-sidebar>
    </div>
  }

  <div class="flex-1 flex flex-col min-w-0">
    <app-top-navbar (sidebarToggle)="toggleSidebar()"></app-top-navbar>

    <div class="border-b border-slate-200 bg-white px-6 py-3 dark:border-slate-800 dark:bg-slate-950">
      <app-breadcrumbs />
    </div>

    <main class="p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
