<main class="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100 flex items-center justify-center p-4">
  <section class="w-full max-w-md bg-white rounded-xl shadow-xl p-6">
    <div class="flex flex-col items-center gap-3 pb-4">
      <app-brand-logo variant="auth" [wordmark]="false" />
    </div>

    <app-ux-state
      [state]="isLoading ? 'in-progress' : status === 'invalid' ? 'empty' : status === 'success' ? 'success' : status === 'error' ? 'error' : 'loaded'"
      [error]="loadError"
      [title]="status === 'success' ? 'Email confirmed' : status === 'invalid' ? 'Invalid or expired link' : status === 'error' ? 'Could not confirm email' : ''"
      [description]="status === 'success' ? (message || 'Your email is confirmed and you can sign in now.') : status === 'invalid' ? 'This confirmation link is missing required information or has expired. Please request a new one.' : status === 'error' ? 'We could not complete email confirmation at this time. Try again or request a new link.' : ''"
      [busyLabel]="'Confirming your email…'"
      (retry)="attemptConfirm()"
    >
      <div class="sr-only">Awaiting confirmation state.</div>
    </app-ux-state>

    @if (status === 'invalid' || status === 'error') {
      <div class="w-full space-y-2 pt-4">
        <a
          routerLink="/resend-confirmation"
          class="block w-full text-center rounded-lg bg-blue-600 text-white font-medium py-2.5 text-sm hover:bg-blue-500 transition-colors duration-150"
        >
          Resend confirmation email
        </a>
        <a
          routerLink="/login"
          class="block w-full text-center text-sm font-medium text-blue-600 hover:text-blue-500"
        >
          Back to sign in
        </a>
      </div>
    }

    @if (status === 'success') {
      <a
        routerLink="/login"
        class="mt-4 w-full inline-flex justify-center rounded-lg bg-blue-600 text-white font-medium py-2.5 text-sm hover:bg-blue-500 transition-colors duration-150"
      >
        Sign in
      </a>
    }
  </section>
</main>
