<section class="max-w-2xl space-y-6">
  <a
    routerLink="/app/users"
    class="inline-flex items-center gap-2 text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors duration-150"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/>
    </svg>
    Back to users
  </a>

  <header>
    <h1 class="text-2xl font-semibold text-slate-900">Create user</h1>
    <p class="text-slate-500 mt-1">Send an invitation so the user can set a password and access IdentityHub.</p>
  </header>

  <form (ngSubmit)="submit()" [formGroup]="createForm" class="bg-white rounded-xl border shadow-sm p-6 space-y-6">
    <div>
      <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        autocomplete="email"
        placeholder="person@company.com"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      />
      @if (emailControl.invalid && (emailControl.touched || emailControl.dirty)) {
        <small class="text-red-600">Enter a valid email.</small>
      }
    </div>

    <div>
      <label for="fullName" class="block text-sm font-medium text-slate-700 mb-1.5">Full name (optional)</label>
      <input
        id="fullName"
        type="text"
        formControlName="fullName"
        autocomplete="name"
        placeholder="Jane Doe"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      />
    </div>

    @if (submitError) {
      <div class="border-t border-slate-100 pt-4">
        <app-load-error-banner [error]="submitError" (retry)="submit()" />
      </div>
    }

    <div class="flex flex-wrap gap-3 pt-2">
      <button
        type="submit"
        [disabled]="isSubmitting"
        class="inline-flex items-center justify-center rounded-lg bg-blue-600 text-white px-4 py-2 text-sm font-medium hover:bg-blue-500 disabled:opacity-60 disabled:pointer-events-none transition-colors duration-150"
      >
        @if (isSubmitting) {
          Sending…
        } @else {
          Send invite
        }
      </button>
      <a
        routerLink="/app/users"
        class="inline-flex items-center justify-center rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors duration-150"
      >
        Cancel
      </a>
    </div>
  </form>
</section>
