<header class="border-b bg-white px-6 py-3 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <button
      type="button"
      class="h-9 w-9 rounded-lg border border-slate-200 hover:bg-slate-100 transition-colors duration-150"
      (click)="toggleSidebar()"
      aria-label="Toggle sidebar"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mx-auto text-slate-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5m-16.5 5.25h16.5m-16.5 5.25h16.5"/>
      </svg>
    </button>

    <div class="relative">
    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-4.35-4.35m0 0a7.5 7.5 0 1 0-10.607 0 7.5 7.5 0 0 0 10.607 0Z"/>
      </svg>
    </span>
    <input
      type="text"
      placeholder="Search..."
      class="pl-9 pr-3 py-2 w-72 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-300"
    />
    </div>
  </div>

  <div class="flex items-center gap-3 relative">
    <button
      type="button"
      class="flex items-center gap-2 rounded-lg px-2 py-1 hover:bg-slate-100 transition-all duration-150"
      (click)="toggleUserMenu()"
    >
      <span class="h-8 w-8 rounded-full bg-slate-800 text-white flex items-center justify-center text-sm">P</span>
      <span class="text-sm font-medium text-slate-700">{{ displayName }}</span>
      <span class="text-slate-500">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/>
        </svg>
      </span>
    </button>

    @if (isUserMenuOpen) {
      <div class="absolute right-0 top-12 w-40 rounded-lg border bg-white shadow-lg py-1 z-10">
        <button type="button" class="w-full text-left px-3 py-2 text-sm hover:bg-slate-50">Profile</button>
        <button type="button" class="w-full text-left px-3 py-2 text-sm hover:bg-slate-50 text-red-600" (click)="logout()">Logout</button>
      </div>
    }
  </div>
</header>
