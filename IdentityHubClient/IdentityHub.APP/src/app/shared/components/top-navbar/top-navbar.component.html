<header class="border-b bg-white px-6 py-3 flex items-center justify-between dark:border-slate-800 dark:bg-slate-950">
  <div class="flex items-center gap-3 min-w-0">
    <button
      type="button"
      class="h-9 w-9 rounded-lg border border-slate-200 hover:bg-slate-100 transition-colors duration-150 dark:border-slate-700 dark:hover:bg-slate-800"
      (click)="toggleSidebar()"
      aria-label="Toggle sidebar"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mx-auto text-slate-700 dark:text-slate-200" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5m-16.5 5.25h16.5m-16.5 5.25h16.5"/>
      </svg>
    </button>

    @if (pageTitle()) {
      <span class="hidden sm:block truncate text-sm font-semibold text-slate-800 dark:text-slate-100">{{ pageTitle() }}</span>
    }

    @if (envBadge.visible) {
      <span
        class="inline-flex items-center rounded-full px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide ring-1"
        [ngClass]="envBadge.classes"
        title="Current environment"
      >
        {{ envBadge.label }}
      </span>
    }
  </div>

  <div class="flex items-center gap-2 relative">
    <button
      type="button"
      class="h-9 w-9 rounded-lg border border-slate-200 hover:bg-slate-100 transition-colors duration-150 flex items-center justify-center text-slate-700 dark:border-slate-700 dark:hover:bg-slate-800 dark:text-slate-200"
      (click)="toggleTheme()"
      [attr.aria-label]="theme() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
      [title]="theme() === 'dark' ? 'Light theme' : 'Dark theme'"
    >
      @if (theme() === 'dark') {
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/>
        </svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"/>
        </svg>
      }
    </button>

    <button
      type="button"
      class="flex items-center gap-2 rounded-lg px-2 py-1 hover:bg-slate-100 transition-all duration-150 dark:hover:bg-slate-800"
      (click)="toggleUserMenu()"
    >
      <span class="h-8 w-8 rounded-full bg-slate-800 text-white flex items-center justify-center text-sm dark:bg-slate-700">P</span>
      <span class="text-sm font-medium text-slate-700 dark:text-slate-200">{{ displayName }}</span>
      <span class="text-slate-500 dark:text-slate-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/>
        </svg>
      </span>
    </button>

    @if (isUserMenuOpen) {
      <div class="absolute right-0 top-12 w-48 rounded-lg border bg-white shadow-lg py-1 z-10 dark:border-slate-800 dark:bg-slate-900">
        <a
          routerLink="/app/profile"
          (click)="isUserMenuOpen = false"
          class="block w-full text-left px-3 py-2 text-sm hover:bg-slate-50 text-slate-700 dark:text-slate-200 dark:hover:bg-slate-800"
        >
          Profile
        </a>
        <button type="button" class="w-full text-left px-3 py-2 text-sm hover:bg-slate-50 text-red-600 dark:hover:bg-slate-800" (click)="logout()">Logout</button>
      </div>
    }
  </div>
</header>
